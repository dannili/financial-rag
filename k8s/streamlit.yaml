apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: financial-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
        - name: streamlit
          image: YOUR_ECR_REPO/financial-rag-streamlit:latest
          ports:
            - containerPort: 8501
          env:
            - name: API_URL
              value: "http://api-service:8000"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
  namespace: financial-rag
spec:
  selector:
    app: streamlit
  ports:
    - port: 8501
      targetPort: 8501
  type: LoadBalancer